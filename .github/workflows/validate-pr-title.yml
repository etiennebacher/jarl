# `pull_request_target` is safe and appropriate here: this workflow never
# checks out PR code (no `actions/checkout` step) and only reads
# `context.payload.pull_request.title` (metadata, not code). `pull_request_target`
# is needed so that PRs opened from forks can still be validated
# and labelled (which requires `pull-requests: write` and a token with
# repo access).

name: Pull request labeler

on:
  pull_request_target:
    types: [opened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - name: Check for trailing spaces in PR title
        uses: actions/github-script@v9
        with:
          script: |
            const title = context.payload.pull_request.title;
            if (title.endsWith(' ')) {
              core.setFailed('❌ PR title has trailing spaces. Please remove any spaces at the end of the title.');
            } else if (title.startsWith(' ')) {
              core.setFailed('❌ PR title has leading spaces. Please remove any spaces at the beginning of the title.');
            }

      - name: Check pull request title
        uses: thehanimo/pr-title-checker@v1.4.2
        with:
          GITHUB_TOKEN: ${{ secrets.JARL_PR_TITLE }}
