# Produces ecosystem results then published by "ecosystem-check-comment.yml".
# See comment in "ecosystem-check-comment.yml".

name: Ecosystem check

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ecosystem-check.yml
      - .github/scripts/process_lint_ci.R
      - crates/**/src/**
      - crates/**/Cargo.toml
      - "!crates/jarl-lsp/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TEST_REPOS: |
    # packages
    apache/arrow@ec56b377340feb8d46b289342b403aa489effaa1
    cran/survey@4834b8bc91f6414ad4514552daaed8990a86d9c1
    easystats/datawizard@7466ff6f91040e25f826b224a4ef5e9aeb63b567
    igraph/rigraph@ea3c69f64c7d888a37eaa5e3d82291e04975b5da
    klmr/box@46bec1bc4d8273c42b85c0d7b4323721c2ad45f5
    lrberge/stringmagic@87b187d40c745ea1d8496f071aee7229985da23c
    mlr-org/mlr3@127da9a11073142226b76235ce4391ea0029477d
    nlmixr2/nlmixr2est@78f8d3e19e04a628337b3739e27821eca1d31699
    pola-rs/r-polars@055f891d977d6a8004fe8ab1bb5d47cfdd44872a
    R-ArcGIS/arcgisgeocode@3a7877641ca2f3a761ef0ec3a7486820ab94c9cc
    RcppCore/RcppArmadillo@201718fa64d78191cb42142c794e50e2581be3b3
    Rdatatable/data.table@d7833cb3a0c36ab329fcfe5cc1523449663f898f
    ropensci/targets@d45243e1a239da467c6e96e0069ecb7368f78021
    ropensci-review-tools/pkgcheck@12d80c8ad3bc39c94174f0276386869a52568135
    rstudio/shiny@b6e9e9d216cd574cf8985d23772399f51ee4a4ac
    tidyverse/dplyr@384ff2c4af79a9bd9142d8bdab23efbcd52f275b
    tidyverse/ggplot2@bed8e32d45c7dc98afb783b409edac98854d41a7
    vincentarelbundock/marginaleffects@ffe5a4f5962a9ba51c3e68e1c55eea62887c25da
    wch/r-source@b5cf23a805f4305852f55c4148f2a302b06844b5

    # other
    grantmcdermott/skeptic-priors@45de00d7593e462c6d6ac9d5185733ff9665ea90
    lrberge/linking_winst@5256288ff88cdd9f32241bf3a85ccf7627691a08
    rmcelreath/stat_rethinking_2026@e543cef90588cae06fadc3532142964d9cba4fd9
    TheAlgorithms/R@f65344fabeea0ae33c1ca321af709447c1a8a4c2

jobs:
  ecosystem-check:
    runs-on: macos-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1

      - name: Set up R for package-specific rules and to process results
        uses: r-lib/actions/setup-r@v2.12.0
        with:
          use-public-rspm: true

      # Note: in an ideal world, we'd install all dependencies of the packages
      # we test below, but this would make the CI much slower.
      - name: Install packages that have rules in Jarl
        run: |
          Rscript -e "install.packages(c('dplyr'))"

      - name: Install packages to process results
        run: |
          R -e "install.packages(c('data.table', 'jsonlite'))"

      - name: Build jarl binary from PR
        run: cargo build --release --package jarl

      - name: Save PR binary path
        run: |
          cp target/release/jarl target/release/jarl-pr
          echo "PR_JARL=$(pwd)/target/release/jarl-pr" >> $GITHUB_ENV

      - name: Build jarl binary from main branch
        run: |
          git fetch origin main
          git checkout origin/main
          cargo build --release --package jarl

      - name: Save main binary path
        run: echo "MAIN_JARL=$(pwd)/target/release/jarl" >> $GITHUB_ENV

      - name: Clone all test repos
        run: |
          mkdir -p test-repos
          cd test-repos
          for repo in $TEST_REPOS; do
            # Skip category markers / comment words (only real entries have "@")
            case "$repo" in
              *@*) ;;
              *) continue ;;
            esac

            repo_name=$(echo "$repo" | cut -d'@' -f1)
            commit_sha=$(echo "$repo" | cut -d'@' -f2)
            repo_dir=$(echo "$repo_name" | tr '/' '_')

            git clone --revision=$commit_sha --depth 1 https://github.com/$repo_name.git $(echo $repo_dir | tr '/' '_')
          done

      - name: Run CLI on all repos
        run: |
          mkdir -p results
          cd test-repos
          for repo in $TEST_REPOS; do
            # Skip category markers / comment words (only real entries have "@")
            case "$repo" in
              *@*) ;;
              *) continue ;;
            esac

            repo_name=$(echo "$repo" | cut -d'@' -f1)
            repo_dir=$(echo "$repo_name" | tr '/' '_')

            # Run main
            (cd "$repo_dir" && $MAIN_JARL check . --select ALL --min-r-version 99.99 --output-format json) > "../results/${repo_dir}_main.json" || true

            # Run PR
            (cd "$repo_dir" && $PR_JARL check . --select ALL --min-r-version 99.99 --output-format json) > "../results/${repo_dir}_pr.json" || true
          done

      - name: Upload all result JSONs
        uses: actions/upload-artifact@v7
        with:
          name: jarl-json-results
          path: results/

      - name: Process lint results
        run: |
          source(".github/scripts/process_lint_ci.R", echo = TRUE)
        shell: Rscript {0}

      - name: Save PR number for downstream comment workflow
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload PR number
        uses: actions/upload-artifact@v7
        with:
          name: pr-number
          path: pr-number.txt

      - name: Upload lint comparison for downstream comment workflow
        uses: actions/upload-artifact@v7
        with:
          name: lint-results
          path: lint_comparison.md
