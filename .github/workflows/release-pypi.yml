# Entirely copied from Air
# https://github.com/posit-dev/air/blob/8c60596a0daae0186ec169e64d765b945c2ce6a5/.github/workflows/release-pypi.yml

# Build wheels and publish to PyPI
#
# See these docs for more about trusted publishing
# https://docs.pypi.org/trusted-publishers/
name: Release PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Binary version. No leading `v`.
        required: true
        type: string
      dry_run:
        description: Build wheels, but skip publishing.
        required: true
        default: false
        type: boolean

jobs:
  # Resolve the version from either the release tag or the manual input
  resolve-version:
    name: "Resolve Version"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: "Build Wheels (${{ matrix.this.target }})"
    needs: resolve-version
    runs-on: ${{ matrix.this.runner }}
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    strategy:
      matrix:
        this:
            # Platform tags are based on https://pypi.org/project/ruff/#files
            # - macosx_10_12 matches Rust's default support
            # - macosx_11_0 is the minimum for ARM Mac
            # - manylinux_2_28 is what we build the binaries in for Linux
          - target: x86_64-apple-darwin
            platform_tag: macosx_10_12_x86_64
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            platform_tag: macosx_11_0_arm64
            runner: macos-14
          - target: x86_64-unknown-linux-gnu
            platform_tag: manylinux_2_28_x86_64
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            platform_tag: manylinux_2_28_aarch64
            runner: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            platform_tag: win_amd64
            runner: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - name: "Download binary"
        run: |
          TARGET=${{ matrix.this.target }}

          # uv knows to copy `scripts/` to `.data/scripts/` in the wheel
          mkdir -p python/scripts

          if [[ "$TARGET" == *windows* ]]; then
            ARCHIVE_NAME=jarl-$TARGET
            ARCHIVE_FILE=$ARCHIVE_NAME.zip

            curl -LsSfO https://github.com/etiennebacher/jarl/releases/download/${{ needs.resolve-version.outputs.version }}/$ARCHIVE_FILE
            unzip $ARCHIVE_FILE
            mv jarl.exe python/scripts/jarl.exe
          else
            ARCHIVE_NAME=jarl-$TARGET
            ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

            curl -LsSfO https://github.com/etiennebacher/jarl/releases/download/${{ needs.resolve-version.outputs.version }}/$ARCHIVE_FILE
            tar -xvzf $ARCHIVE_FILE
            mv $ARCHIVE_NAME/jarl python/scripts/jarl
            chmod +x python/scripts/jarl
          fi

      - name: "Build wheel"
        # Builds the wheel as generic `jarl-{jarl-version}-py3-none-any.whl`
        run: uv build --wheel --out-dir wheel/ python/

      - name: "Retag wheel"
        # Retag the wheel with known platform-tag, becoming `jarl-{jarl-version}-py3-none-{platform-tag}.whl`
        run: uvx wheel tags --platform-tag ${{ matrix.this.platform_tag }} --remove wheel/*.whl

      - name: "Test wheel"
        run: uv tool run --from wheel/*.whl jarl --help

      - name: "Upload wheel"
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.this.target }}
          path: wheel/*.whl

  publish:
    name: "Publish to PyPI"
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - build

    # For the restricted GitHub Environment
    environment: pypi

    permissions:
      # For PyPI's trusted publishing
      id-token: write

    steps:
      - uses: astral-sh/setup-uv@v7

      - name: "Download wheels"
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheels
          merge-multiple: true

      - name: "Publish"
        if: ${{ github.event_name == 'release' || inputs.dry_run == false }}
        run: uv publish wheels/*
